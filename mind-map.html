<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAIDYA · Interactive 9‑Step Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0A1F3F;
            --navy-light: #132D56;
            --teal: #0E9488;
            --teal-dark: #0B7A6F;
            --teal-light: #CCFBF1;
            --gold: #C8963E;
            --gold-light: #FDF2E0;
            --white: #FFFFFF;
            --bg: #F4F6F9;
            --gray-50: #F9FAFB;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-300: #CBD5E1;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-600: #475569;
            --text: #1E293B;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 40px rgba(0,0,0,0.12);
            --shadow-xl: 0 24px 60px rgba(0,0,0,0.16);
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:var(--bg);
            color:var(--text);
            font-size:0.9rem;
            line-height:1.6;
            -webkit-font-smoothing:antialiased;
            overflow-x:hidden;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(14,148,136,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(200,150,62,0.03) 0%, transparent 50%);
        }
        .container{max-width:1400px;margin:0 auto;padding:0 1.5rem;}
        /* ── HEADER ── */
        .main-header {
            background: rgba(10,26,47,0.94);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom:1px solid rgba(255,255,255,0.08);
            padding:0.75rem 2rem;
            display:flex; align-items:center; justify-content:space-between;
            gap:2rem; position:sticky; top:0; z-index:1000;
            box-shadow:0 8px 30px rgba(0,0,0,0.3);
        }
        .header-brand{display:flex;align-items:center;gap:0.8rem;}
        .brand-icon{
            width:44px;height:44px;
            background:linear-gradient(135deg, var(--teal) 0%, #0B7A6F 100%);
            border-radius:14px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:1.4rem; box-shadow:0 8px 20px rgba(14,148,136,0.35);
        }
        .brand-text{display:flex;flex-direction:column;}
        .brand-name{font-weight:900;font-size:1.45rem;letter-spacing:-0.02em;color:#fff;}
        .brand-tagline{font-size:0.6rem;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.55);text-transform:uppercase;}
        .header-actions{display:flex;align-items:center;gap:0.75rem;}
        .btn-header{
            padding:0.5rem 1.2rem; border-radius:50px; font-weight:600; font-size:0.7rem;
            border:1.5px solid rgba(255,255,255,0.3); background:transparent; color:#fff;
            cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif;
            display:inline-flex; align-items:center; gap:0.4rem; text-decoration:none;
        }
        .btn-header:hover{background:rgba(255,255,255,0.1);border-color:var(--teal);}
        .btn-header-primary{background:var(--teal);border-color:var(--teal);}
        .btn-header-primary:hover{background:var(--teal-dark);}

        /* ── PAGE TITLE ── */
        .page-hero {
            background:linear-gradient(180deg, var(--navy) 0%, #0C233A 100%);
            color:#fff; padding:2.5rem 1.5rem 2rem; text-align:center;
        }
        .page-hero h1{font-weight:900;font-size:2.2rem;letter-spacing:-0.02em;}
        .page-hero h1 span{color:var(--teal-light);}
        .page-hero p{color:rgba(255,255,255,0.7);max-width:600px;margin:0.5rem auto 0;font-size:0.8rem;}

        /* ── SNAKE ROADMAP ── */
        .roadmap-container {
            position:relative;
            padding:3rem 1.5rem 4rem;
            max-width:1400px;
            margin:0 auto;
        }
        .roadmap-grid {
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:3rem 2.5rem;
            position:relative;
            z-index:2;
        }
        @media (max-width:1000px){
            .roadmap-grid{grid-template-columns:1fr 1fr; gap:2.5rem 1.8rem;}
        }
        @media (max-width:650px){
            .roadmap-grid{grid-template-columns:1fr; gap:2rem;}
        }
        .step-card {
            background:var(--white);
            border-radius:var(--radius-xl);
            box-shadow:var(--shadow-lg);
            border:2px solid var(--gray-200);
            transition:var(--transition);
            position:relative;
            overflow:visible;
            cursor:pointer;
            display:flex;
            flex-direction:column;
        }
        .step-card:hover {
            transform:translateY(-6px);
            box-shadow:var(--shadow-xl);
            border-color:var(--teal);
        }
        .step-card.active-step{
            border-color:var(--gold);
            box-shadow:0 0 0 8px rgba(200,150,62,0.15), var(--shadow-xl);
        }
        .step-card .video-wrapper {
            position:relative;
            width:100%; aspect-ratio:16/9;
            background:linear-gradient(145deg, #1E293B 0%, #0F172A 100%);
            border-radius:var(--radius-xl) var(--radius-xl) 0 0;
            overflow:hidden;
        }
        .step-card .video-wrapper video {
            width:100%; height:100%; object-fit:cover; display:none;
        }
        .step-card .video-wrapper video.active { display:block; }
        .video-placeholder-overlay {
            position:absolute; inset:0;
            display:flex; align-items:center; justify-content:center;
            background:rgba(0,0,0,0.3);
            cursor:pointer;
            transition:var(--transition);
        }
        .video-placeholder-overlay:hover { background:rgba(0,0,0,0.45); }
        .play-button {
            width:64px; height:64px;
            background:rgba(255,255,255,0.2);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            backdrop-filter:blur(8px);
            border:2px solid rgba(255,255,255,0.3);
            transition:var(--transition);
        }
        .play-button i { font-size:1.8rem; color:#fff; }
        .step-num-badge {
            position:absolute; top:12px; left:12px;
            background:var(--teal); color:white;
            font-weight:800; font-size:0.8rem; padding:0.3rem 0.9rem;
            border-radius:50px; z-index:3;
            box-shadow:0 2px 8px rgba(0,0,0,0.3);
        }
        .card-body { padding:1.3rem 1.5rem; flex:1; display:flex; flex-direction:column; gap:0.5rem; }
        .card-title { font-weight:800; font-size:1.15rem; color:var(--navy); }
        .card-summary { font-size:0.78rem; color:var(--gray-500); line-height:1.5; margin-bottom:0.3rem; }
        .expand-btn {
            background:var(--teal-light);
            border:1px solid #B2ECE0;
            border-radius:50px;
            padding:0.45rem 1rem;
            font-weight:700; font-size:0.7rem;
            color:#0F766E;
            cursor:pointer;
            transition:var(--transition);
            display:inline-flex; align-items:center; gap:0.35rem;
            font-family:'Inter',sans-serif;
            align-self:flex-start;
        }
        .expand-btn:hover { background:#B2ECE0; }
        .detail-panel {
            max-height:0; overflow:hidden; transition:max-height 0.6s ease;
            margin-top:0.5rem; border-top:1px solid var(--gray-100);
        }
        .detail-panel.expanded { max-height:400px; padding-top:0.8rem; }
        .detail-panel .subhead {
            font-weight:700; font-size:0.7rem; text-transform:uppercase;
            letter-spacing:0.05em; color:var(--navy); margin:0.6rem 0 0.3rem;
        }
        .detail-panel ul { list-style:none; padding:0; margin:0; }
        .detail-panel li {
            padding:0.35rem 0; font-size:0.7rem; color:var(--gray-600);
            display:flex; gap:0.4rem; align-items:baseline;
            border-bottom:1px solid var(--gray-50);
        }
        .detail-panel li::before { content:'▹'; color:var(--teal); font-weight:700; }

        /* ── SVG CONNECTORS ── */
        .connector-svg {
            position:absolute; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:1;
        }
        .connector-path {
            fill:none;
            stroke:url(#lineGradient);
            stroke-width:5;
            stroke-linecap:round;
            stroke-linejoin:round;
            stroke-dasharray:12 6;
            animation: dashMove 1.8s linear infinite;
        }
        .connector-path.solid { stroke-dasharray:none; animation:none; opacity:0.4; }
        @keyframes dashMove { to { stroke-dashoffset:-18; } }

        /* ── MODAL ── */
        .video-modal {
            display:none;
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); z-index:9999;
            align-items:center; justify-content:center;
        }
        .video-modal.active { display:flex; }
        .video-modal .close-modal {
            position:absolute; top:20px; right:30px;
            font-size:2.2rem; color:#fff; cursor:pointer; z-index:10;
        }
        .video-modal video {
            max-width:90%; max-height:90%; border-radius:12px;
            box-shadow:0 0 40px rgba(0,0,0,0.5);
        }

        /* ── NAVIGATION ── */
        .nav-buttons {
            display:flex; justify-content:center; gap:1rem; margin-top:2rem;
        }
        .nav-btn {
            padding:0.7rem 1.8rem; border-radius:50px; font-weight:700; font-size:0.85rem;
            border:2px solid var(--gray-300); background:var(--white);
            cursor:pointer; transition:var(--transition);
            font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:0.4rem;
        }
        .nav-btn:hover { border-color:var(--teal); color:var(--teal); }
        .nav-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .nav-btn.primary { background:var(--teal); color:#fff; border-color:var(--teal); }
        .nav-btn.primary:hover { background:var(--teal-dark); }

        .progress-indicator {
            text-align:center; margin:1.5rem 0 0.5rem; font-weight:600; color:var(--gray-500);
        }
        .progress-dots {
            display:flex; justify-content:center; gap:0.5rem; margin-bottom:1rem;
        }
        .progress-dot {
            width:12px; height:12px; border-radius:50%; background:var(--gray-300);
            transition:var(--transition);
        }
        .progress-dot.active { background:var(--teal); box-shadow:0 0 10px var(--teal); }
        .progress-dot.done { background:#10B981; }

        /* ── FOOTER ── */
        .footer {
            text-align:center; padding:2rem; color:var(--gray-400); font-size:0.65rem;
            border-top:1px solid var(--gray-200); margin-top:2rem;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-brand">
            <div class="brand-icon"><i class="fa-solid fa-staff-snake"></i></div>
            <div class="brand-text">
                <span class="brand-name">VAIDYA</span>
                <span class="brand-tagline">by KALKI INTELLIGENCE</span>
            </div>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn-header"><i class="fa-solid fa-house"></i> Home</a>
            <a href="dashboard.html" class="btn-header btn-header-primary"><i class="fa-solid fa-play"></i> Live Dashboard</a>
        </div>
    </header>

    <div class="page-hero">
        <h1>🧠 <span>9‑Step</span> Interactive Roadmap</h1>
        <p>Click on any video to play, expand details, and navigate sequentially.</p>
    </div>

    <div class="roadmap-container" id="roadmapContainer">
        <div class="roadmap-grid" id="roadmapGrid">
            <!-- Cards rendered by JavaScript -->
        </div>
        <svg class="connector-svg" id="connectorSvg" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="lineGradient" gradientUnits="userSpaceOnUse" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0E9488">
                        <animate attributeName="stop-color" values="#0E9488;#C8963E;#0E9488" dur="3s" repeatCount="indefinite"/>
                    </stop>
                    <stop offset="100%" stop-color="#C8963E">
                        <animate attributeName="stop-color" values="#C8963E;#0E9488;#C8963E" dur="3s" repeatCount="indefinite"/>
                    </stop>
                </linearGradient>
            </defs>
            <g id="connectorGroup"></g>
        </svg>
    </div>

    <div class="progress-dots" id="progressDots">
        <span class="progress-dot active"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
    </div>
    <div class="progress-indicator">Step <span id="currentStepDisplay">1</span> of 9</div>
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-arrow-left"></i> Previous</button>
        <button class="nav-btn primary" id="nextBtn">Next <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <!-- Video Modal -->
    <div class="video-modal" id="videoModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <video id="modalVideo" controls autoplay></video>
    </div>

    <footer class="footer">
        © 2025 KALKI INTELLIGENCE · VAIDYA · Replace placeholder .webm with actual videos.
    </footer>

    <script>
        const VIDEO_BASE = 'https://raw.githubusercontent.com/kalkitechnologieski-art/apollo/main/videos/';

        const stepsData = [
            { id:1, icon:"📱", title:"Patient Check‑in", summary:"QR scan at reception → WhatsApp opens.", details:[
                {subhead:"Reception", items:["Patient scans QR code placed on counter","WhatsApp auto‑opens with pre‑filled greeting","Receptionist confirms identity digitally","System logs check‑in timestamp"]},
            ]},
            { id:2, icon:"🤖", title:"AI Triage Bot", summary:"WhatsApp chatbot collects name, age, concern.", details:[
                {subhead:"Bot Conversation", items:["Bot asks: 'Your full name?' → Patient replies","Bot requests age → Patient inputs number","Bot asks chief concern → Patient describes symptoms","AI extracts structured data (age, symptoms, urgency)"]},
            ]},
            { id:3, icon:"🔢", title:"Token Queue", summary:"Digital token + live queue position.", details:[
                {subhead:"Assignment", items:["System generates token number (e.g., #12)","WhatsApp message confirms token and queue position","Live progress bar shows how many patients are ahead","No physical token paper – purely digital"]},
            ]},
            { id:4, icon:"📞", title:"AI Voice Call", summary:"Auto‑call when token is near.", details:[
                {subhead:"Proactive Alert", items:["Patient’s phone rings – caller ID: 'Clinic Assistant'","AI voice announces: 'Your turn in 5 min. Please go to Room 3'","Call duration logged automatically (avg 20–30 sec)"]},
            ]},
            { id:5, icon:"👨‍⚕️", title:"Live Consultation", summary:"Doctor + patient, AI transcribes speech.", details:[
                {subhead:"In‑Room Setup", items:["Doctor’s laptop shows dashboard with patient card","Microphone icon glowing green – AI listening","Speech converted to text instantly","Medical entities (medicines, dosages) highlighted"]},
            ]},
            { id:6, icon:"💊", title:"Prescription AI", summary:"AI extracts medicines, dosage, preventive tips.", details:[
                {subhead:"Auto Extraction", items:["Floating widget detects drug names and dosages","E.g., Azithromycin 500mg – Once daily, 3 days","Diagnosis auto‑filled (e.g., Acute Viral Infection)"]},
            ]},
            { id:7, icon:"🖥️", title:"Queue Control", summary:"Doctor clicks 'Next' to call next patient.", details:[
                {subhead:"Dashboard View", items:["Full queue with status indicators (Waiting / With Doctor / Completed)","Doctor clicks green '✅ Next' button","Toast notification: '📞 Calling Patient #10...'","Queue auto‑shifts, call log updated"]},
            ]},
            { id:8, icon:"📄", title:"WhatsApp Report", summary:"PDF report delivered instantly.", details:[
                {subhead:"Generation", items:["Dashboard shows '✅ Report sent to Rahul Sharma'","Patient receives WhatsApp message with PDF attachment","PDF contents: clinic letterhead, medicine timetable, diagnosis"]},
            ]},
            { id:9, icon:"✅", title:"Exit & Summary", summary:"Happy patient leaves, dashboard shows daily recap.", details:[
                {subhead:"Patient Exit", items:["Patient walks out, gives thumbs‑up to receptionist","Report saved on phone for future reference","Dashboard displays daily stats: patients seen, reports sent"]},
            ]},
        ];

        const cols = 3; // number of columns in grid
        const snakeOrder = [0, 1, 2, 5, 4, 3, 6, 7, 8]; // indices to create snake pattern

        const roadmapGrid = document.getElementById('roadmapGrid');
        const connectorGroup = document.getElementById('connectorGroup');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentStepDisplay = document.getElementById('currentStepDisplay');
        const progressDots = document.querySelectorAll('.progress-dot');
        const videoModal = document.getElementById('videoModal');
        const modalVideo = document.getElementById('modalVideo');
        const closeModal = document.getElementById('closeModal');

        let currentActiveIndex = 0; // index in snakeOrder (0-8)

        function buildCard(step, indexInSnake) {
            const card = document.createElement('div');
            card.className = 'step-card';
            card.dataset.stepId = step.id;
            card.dataset.snakeIndex = indexInSnake;
            card.innerHTML = `
                <div class="video-wrapper">
                    <video class="step-video" src="${VIDEO_BASE}step${step.id}.webm" muted loop playsinline></video>
                    <div class="video-placeholder-overlay">
                        <div class="step-num-badge">${step.id}</div>
                        <div class="play-button"><i class="fa-solid fa-play"></i></div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-title">${step.icon} ${step.title}</div>
                    <div class="card-summary">${step.summary}</div>
                    <button class="expand-btn"><i class="fa-solid fa-chevron-down"></i> Details</button>
                    <div class="detail-panel">
                        ${step.details.map(d => `
                            <div class="subhead">${d.subhead}</div>
                            <ul>${d.items.map(i => `<li>${i}</li>`).join('')}</ul>
                        `).join('')}
                    </div>
                </div>
            `;
            return card;
        }

        function renderCards() {
            roadmapGrid.innerHTML = '';
            snakeOrder.forEach((dataIndex, snakeIndex) => {
                const card = buildCard(stepsData[dataIndex], snakeIndex);
                roadmapGrid.appendChild(card);
            });
            attachCardEvents();
            updateActiveStepUI();
            drawConnectors();
        }

        function attachCardEvents() {
            document.querySelectorAll('.step-card').forEach(card => {
                const video = card.querySelector('.step-video');
                const overlay = card.querySelector('.video-placeholder-overlay');
                const playBtn = overlay.querySelector('.play-button');

                overlay.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(video.src);
                });

                const expandBtn = card.querySelector('.expand-btn');
                const panel = card.querySelector('.detail-panel');
                expandBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = panel.classList.contains('expanded');
                    document.querySelectorAll('.detail-panel.expanded').forEach(p => p.classList.remove('expanded'));
                    document.querySelectorAll('.expand-btn').forEach(b => b.classList.remove('open'));
                    if (!isOpen) {
                        panel.classList.add('expanded');
                        expandBtn.classList.add('open');
                        expandBtn.querySelector('i').classList.replace('fa-chevron-down','fa-chevron-up');
                    } else {
                        panel.classList.remove('expanded');
                        expandBtn.classList.remove('open');
                        expandBtn.querySelector('i').classList.replace('fa-chevron-up','fa-chevron-down');
                    }
                });
            });
        }

        function updateActiveStepUI() {
            // Remove active from all
            document.querySelectorAll('.step-card').forEach(c => c.classList.remove('active-step'));
            const activeCard = document.querySelector(`.step-card[data-snake-index="${currentActiveIndex}"]`);
            if (activeCard) activeCard.classList.add('active-step');

            // Update progress dots
            progressDots.forEach((dot, idx) => {
                dot.classList.remove('active', 'done');
                if (idx < currentActiveIndex) dot.classList.add('done');
                if (idx === currentActiveIndex) dot.classList.add('active');
            });
            currentStepDisplay.textContent = currentActiveIndex + 1;

            // Update navigation buttons
            prevBtn.disabled = currentActiveIndex === 0;
            nextBtn.disabled = currentActiveIndex === snakeOrder.length - 1;

            // Scroll active card into view
            if (activeCard) {
                activeCard.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
            }
        }

        function navigateToIndex(index) {
            if (index < 0 || index >= snakeOrder.length) return;
            currentActiveIndex = index;
            updateActiveStepUI();
        }

        function openModal(videoSrc) {
            modalVideo.src = videoSrc;
            videoModal.classList.add('active');
            modalVideo.play();
        }

        function closeModalHandler() {
            videoModal.classList.remove('active');
            modalVideo.pause();
            modalVideo.removeAttribute('src');
        }

        function drawConnectors() {
            connectorGroup.innerHTML = '';
            const cards = document.querySelectorAll('.step-card');
            if (cards.length < 2) return;
            const container = document.getElementById('roadmapContainer');
            const containerRect = container.getBoundingClientRect();

            function getCenter(el) {
                const rect = el.getBoundingClientRect();
                return {
                    x: rect.left + rect.width/2 - containerRect.left,
                    y: rect.top + rect.height/2 - containerRect.top
                };
            }

            // Connect snake order: from card with snakeIndex i to i+1
            for (let i = 0; i < snakeOrder.length - 1; i++) {
                const fromCard = document.querySelector(`[data-snake-index="${i}"]`);
                const toCard = document.querySelector(`[data-snake-index="${i+1}"]`);
                if (!fromCard || !toCard) continue;
                const from = getCenter(fromCard);
                const to = getCenter(toCard);

                const midX = (from.x + to.x) / 2;
                const midY = (from.y + to.y) / 2;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const d = `M ${from.x} ${from.y} C ${midX} ${from.y}, ${midX} ${to.y}, ${to.x} ${to.y}`;
                path.setAttribute('d', d);
                path.setAttribute('class', 'connector-path');
                connectorGroup.appendChild(path);
            }
        }

        // Event listeners
        prevBtn.addEventListener('click', () => navigateToIndex(currentActiveIndex - 1));
        nextBtn.addEventListener('click', () => navigateToIndex(currentActiveIndex + 1));

        closeModal.addEventListener('click', closeModalHandler);
        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) closeModalHandler();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') navigateToIndex(currentActiveIndex + 1);
            if (e.key === 'ArrowLeft') navigateToIndex(currentActiveIndex - 1);
        });

        // Resize handler for SVG connectors
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(drawConnectors, 200);
        });

        // Initial render
        renderCards();
    </script>
</body>
</html>
